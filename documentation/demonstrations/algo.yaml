specialBeginEnd:
  -
    name: ForStatement
    begin: \\For\{[^}]+?\}
    end: \\EndFor
  -
    name: FORStatement
    begin: \\FOR\{[^}]+?\}
    end: \\ENDFOR
    nested: 1
  -
    name: WhileStatement
    begin: \\While\{[^}]+?\}
    end: \\EndWhile
    nested: 1
  -
    name: WHILEStatement
    begin: \\WHILE\{[^}]+?\}
    end: \\ENDWHILE
  -
    name: ForAllStatement
    begin: \\ForAll\{[^}]+?\}
    end: \\EndFor
    nested: 1
  -
    name: LoopStatement
    begin: \\Loop
    end: \\EndLoop
  -
    name: RepeatStatement
    begin: \\Repeat
    end: \\Until\{[^}]+?\}
  -
    name: ProcedureStatement
    begin: \\Procedure\{[^}]+?\}\{[^}]+?\}
    end: \\EndProcedure
  -
    name: FunctionStatement
    begin: \\Function\{[^}]+?\}\{[^}]+?\}
    end: \\EndFunction
  -
    name: IfStatement
    begin: \\If\{[^}]+?\}
    middle:
      - \\Else
      - \\ElsIf\{[^}]+?\}
    end: \\EndIf
  -
    name: IFStatement
    begin: \\IF\{[^}]+?\}
    middle:
      - \\ELSE
      - \\ELSIF\{[^}]+?\}
    end: \\ENDIF
  -
    name: inlineMath
    lookForThis: 0

fineTuning:
  commands:
    name: |-
      (?x)
      (?!
        (?:
          begin
          |
          end
          |
          ElsIf
          |
          EndFor
          |
          ENDFOR
          |
          EndWhile
          |
          ENDWHILE
          |
          Function
          |
          For
          |
          FOR
          |
          If
          |
          IF
          |
          Loop
          |
          Procedure
          |
          Repeat
          |
          While
        )
      )[+a-zA-Z@*0-9_:]+
