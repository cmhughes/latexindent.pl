modifyLineBreaks:
  mandatoryArguments:
    cmd:
      MandArgBodyStartsOnOwnLine: 1
      RCuBStartsOnOwnLine: 1

verbatimCommands:
  verb: 0
  lstinline: 0

specialBeginEnd:
  - name: verb
    begin: \\verb\|
    end: \|
    lookForThis: verbatim
  - name: lstinline
    begin: \\lstinline\$
    end: \$
    lookForThis: verbatim
