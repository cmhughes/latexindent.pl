defaultIndent: "  "

noAdditionalIndent:
  document: 0

indentAfterHeadings:
  section:
    indentAfterThisHeading: 1
    level: 3
    blocksEndBefore: |-
      (?x)
        \\end\{document\}
  subsection:
    indentAfterThisHeading: 1
    level: 4
  subsection*:
    indentAfterThisHeading: 0
    level: 4
