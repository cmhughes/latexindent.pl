modifyLineBreaks:
    environments:
        BodyStartsOnOwnLine: 2
        cases:
          BodyStartsOnOwnLine: 0
    optionalArguments:
        cases:
           LSqBStartsOnOwnLine: 1

fineTuning:
  environments:
    name: (?!cases)[a-zA-Z@\*0-9_\\]+
  commands:
    name: (?!begin|end)[+a-zA-Z@*0-9_:]+

specialBeginEnd:
  - name: cases
    begin: \\begin\{cases\}
    end: \\end\{cases\}
    nested: 1
